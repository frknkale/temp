apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: custom-monitoring
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/frknkale/dream'
    targetRevision: HEAD
    path: k8s/custom-monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
