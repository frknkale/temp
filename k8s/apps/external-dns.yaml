apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: 1.14.4
    chart: external-dns
    helm:
      valuesObject:
        provider: coredns
        env:
          - name: ETCD_URLS
            value: http://10.50.0.10:2379 # Assuming etcd on master node
        txtOwnerId: my-cluster-id
        policy: sync
        sources:
          - service
          - ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
