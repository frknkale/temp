apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    targetRevision: 1.14.4
    chart: external-dns
    helm:
      valuesObject:
        provider: coredns
        env:
          - name: ETCD_URLS
            # Points to the dedicated etcd, NOT the Kubernetes etcd
            value: http://etcd-dns.external-dns.svc.cluster.local:2379
        txtOwnerId: dream-cluster
        policy: sync
        sources:
          - service
          - ingress
        logLevel: info
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
