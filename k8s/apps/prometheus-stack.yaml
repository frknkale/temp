apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.1.3
    chart: kube-prometheus-stack
    helm:
      valuesObject:
        # =====================================================================
        # Grafana — accessible at observability.local/grafana
        # =====================================================================
        grafana:
          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password

          # Sidecar picks up ConfigMaps labeled grafana_dashboard: "1"
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: monitoring

          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - observability.local
            path: /grafana

          grafana.ini:
            server:
              domain: observability.local
              root_url: "%(protocol)s://%(domain)s/grafana/"
              serve_from_sub_path: true

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # =====================================================================
        # Prometheus — accessible at observability.local/prometheus
        # =====================================================================
        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - observability.local
            paths:
              - /prometheus
            pathType: Prefix

          prometheusSpec:
            externalUrl: "http://observability.local/prometheus/"
            routePrefix: /prometheus

            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 1
                memory: 2Gi

            # Pick up all ServiceMonitors and PodMonitors regardless of labels
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false

        # =====================================================================
        # AlertManager — accessible at observability.local/alertmanager
        # =====================================================================
        alertmanager:
          enabled: true

          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - observability.local
            paths:
              - /alertmanager
            pathType: Prefix

          alertmanagerSpec:
            externalUrl: "http://observability.local/alertmanager/"
            routePrefix: /alertmanager

            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

          config:
            global:
              resolve_timeout: 5m

            route:
              group_by: ['namespace', 'alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'default-receiver'
              routes:
              - matchers:
                  - alertname = "PodRestarts"
                receiver: 'pod-restart-webhook'
                continue: true

            receivers:
            - name: 'default-receiver'
              # In production, configure email/Slack/PagerDuty here.
              # For this assignment, we use a webhook placeholder.
              webhook_configs:
              - url: 'http://alertmanager-webhook:9095/alerts'
                send_resolved: true

            - name: 'pod-restart-webhook'
              webhook_configs:
              - url: 'http://alertmanager-webhook:9095/pod-restarts'
                send_resolved: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
