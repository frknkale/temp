apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.1.3
    chart: kube-prometheus-stack
    helm:
      valuesObject:
        grafana:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - observability.local
            path: /grafana
          grafana.ini:
            server:
              domain: observability.local
              root_url: "%(protocol)s://%(domain)s/grafana/"
              serve_from_sub_path: true
        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - observability.local
            paths:
              - /prometheus
          prometheusSpec:
            externalUrl: "http://observability.local/prometheus/"
            routePrefix: "/"
        alertmanager:
          config:
            route:
              group_by: ['namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'null'
              routes:
              - matchers:
                  - alertname = "PodRestarts"
                receiver: 'null'
            receivers:
            - name: 'null'
          alertmanagerSpec:
            externalUrl: "http://observability.local/alertmanager/"
            routePrefix: "/"
          ingress:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
