---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: webhook-selfsigned-issuer
  namespace: default
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: webhook-server-tls
  namespace: default
spec:
  dnsNames:
    - resource-validator-svc.default.svc
    - resource-validator-svc.default.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: webhook-selfsigned-issuer
  secretName: webhook-server-tls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-validator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-validator
  template:
    metadata:
      labels:
        app: resource-validator
    spec:
      containers:
      - name: validator
        image: crastle/resource-validator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8443
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: webhook-certs
          mountPath: /etc/webhook/certs
          readOnly: true
      volumes:
      - name: webhook-certs
        secret:
          secretName: webhook-server-tls
---
apiVersion: v1
kind: Service
metadata:
  name: resource-validator-svc
  namespace: default
spec:
  ports:
  - port: 443
    targetPort: 8443
  selector:
    app: resource-validator
---
# Step 2.4: Validate Deployments for required resource requests
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validate-resource-requests
  annotations:
    cert-manager.io/inject-ca-from: default/webhook-server-tls
webhooks:
  - name: validate-resource-requests.example.com
    clientConfig:
      service:
        name: resource-validator-svc
        namespace: default
        path: "/validate"
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["apps"]
        apiVersions: ["v1"]
        resources: ["deployments"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values: ["kube-system", "argocd", "monitoring", "logging", "jenkins"]
