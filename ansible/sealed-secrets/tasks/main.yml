---
- name: Add Bitnami Helm repository
  kubernetes.core.helm_repository:
    name: bitnami
    repo_url: https://charts.bitnami.com/bitnami

- name: Install Sealed Secrets
  kubernetes.core.helm:
    name: sealed-secrets
    chart_ref: bitnami/sealed-secrets
    release_namespace: kube-system
    create_namespace: true
    wait: true

- name: Copy controller key
  copy:
    src: ../../vault/sealed-secrets-key.yaml
    dest: /tmp/sealed-secrets-key.yaml
    mode: "0600"

- name: Restore controller key
  kubernetes.core.k8s:
    state: present
    src: /tmp/sealed-secrets-key.yaml
  register: restore_key

- name: Restart controller
  command: kubectl rollout restart deployment sealed-secrets -n kube-system 
  when: restore_key.changed

- name: Wait for controller
  command: kubectl rollout status deployment sealed-secrets -n kube-system --timeout=180s
  when: restore_key.changed

- name: Remove controller key
  file:
    path: /tmp/sealed-secrets-key.yaml
    state: absent