---
- name: Create Kubernetes keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Kubernetes Release key
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/{{ kubernetes_repo_version }}/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes-release.key
    mode: "0644"

- name: Create Kubernetes APT keyring
  ansible.builtin.command:
    cmd: >
      gpg --dearmor --yes
      -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      /etc/apt/keyrings/kubernetes-release.key
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes repository
  ansible.builtin.deb822_repository:
    name: kubernetes
    types:
      - deb
    uris:
      - https://pkgs.k8s.io/core:/stable:/{{ kubernetes_repo_version }}/deb/
    suites: [/]
    signed_by: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    state: present

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ kubernetes_packages }}"
    state: present
    update_cache: true

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"

- name: Configure kubelet node IP
  ansible.builtin.lineinfile:
    path: /etc/default/kubelet
    regexp: '^KUBELET_EXTRA_ARGS='
    line: 'KUBELET_EXTRA_ARGS=--node-ip={{ ansible_host }}'
    create: true
    mode: "0644"
  notify:
    - Restart kubelet

- name: Enable kubelet
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
