server.port=8080

# Graceful shutdown for zero-downtime deployments (Step 2.3.c)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Actuator endpoints for Kubernetes probes and Prometheus scraping
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Application logging to file (Step 1.7)
logging.file.name=/var/log/app/application.log
